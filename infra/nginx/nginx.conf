worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    log_format main '$remote_addr - $request_id [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # Baseline DoS hygiene at the edge; full OWASP hardening pass is Phase 16.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream web_upstream {
        server web:3000;
    }

    upstream api_upstream {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20m;

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # $request_id is an nginx built-in (unique per request); forwarding
            # it lets RequestContextMiddleware correlate edge and app logs.
            proxy_set_header X-Request-ID $request_id;
        }

        # /metrics is deliberately not proxied here: Prometheus scrapes the
        # api service directly over the internal compose network
        # (see infra/monitoring/prometheus/prometheus.yml), so there is no
        # reason to expose it on the public edge at all. An earlier version
        # of this file tried to restrict it with an `allow/deny` IP
        # allowlist, but that doesn't hold up under Docker's bridge
        # networking: requests arriving via a published port can appear to
        # originate from the bridge gateway IP, which falls inside most
        # private-range allowlists. Not proxying the path at all is the
        # actual fix, not a tighter allowlist.

        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }
    }
}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: basic
  # Swap/add a real backend exporter (Tempo, Jaeger, Honeycomb, etc.) here
  # when one is provisioned; `debug` keeps Phase 1 self-contained.

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]

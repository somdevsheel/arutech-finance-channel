name: arutech

networks:
  arutech:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
  minio-data:
  prometheus-data:
  grafana-data:

x-api-image: &api-image
  build:
    context: ./apps/api
    dockerfile: Dockerfile
  env_file:
    - ./apps/api/.env
  environment:
    DATABASE_URL: postgresql+asyncpg://arutech:arutech@postgres:5432/arutech
    REDIS_URL: redis://redis:6379/0
    S3_ENDPOINT_URL: http://minio:9000
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    CORS_ORIGINS: '["http://localhost","http://localhost:3000"]'
    # The web container calls this API server-to-server (customer-portal
    # BFF, Phase 4) and nginx also proxies to it directly; both live on
    # this compose network's fixed subnet (see the `networks:` block above).
    TRUSTED_PROXY_IPS: '["172.28.0.0/16"]'
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - arutech

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arutech
      POSTGRES_PASSWORD: arutech
      POSTGRES_DB: arutech
    ports:
      # Dev convenience only (DB clients, running Alembic from the host).
      # Host port 5432 is often already taken by other local projects, so
      # this binds a distinct port instead.
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arutech"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arutech

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arutech

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: arutech
      MINIO_ROOT_PASSWORD: insecure-development-only-change-me
    ports:
      - "9500:9000"
      - "9501:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arutech

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 arutech insecure-development-only-change-me &&
      mc mb --ignore-existing local/arutech-documents
      "
    networks:
      - arutech

  api-migrate:
    <<: *api-image
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    <<: *api-image
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    <<: *api-image
    command: ["celery", "-A", "arutech_api.worker", "worker", "--loglevel=INFO"]
    restart: unless-stopped
    # Overrides the image's HTTP-based HEALTHCHECK (inherited from the api
    # image via the anchor above): a Celery worker doesn't serve HTTP, so
    # that check can never pass here.
    healthcheck:
      # No explicit `-d <destination>`: the exec-form CMD isn't shell-expanded,
      # so referencing $HOSTNAME here would be passed through literally rather
      # than substituted. A destination-less ping broadcasts to whichever
      # worker(s) answer, which is all we need to know this one is alive.
      test: ["CMD", "celery", "-A", "arutech_api.worker", "inspect", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined at build time, so this must be a
        # build arg, not a runtime `environment:` entry (which would have
        # no effect on the already-built bundle). NGINX on :80 is the
        # actual public entry point in this topology, unlike .env's :3000
        # default (meant for `pnpm dev` without the proxy in front).
        NEXT_PUBLIC_SITE_URL: http://localhost
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - arutech

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - api
    networks:
      - arutech

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/monitoring/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - arutech

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - arutech

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - arutech
